name: Apply Main Branch Protection

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  protect-main:
    name: Protect main branch
    runs-on: ubuntu-latest

    steps:
      - name: Validate admin token presence
        run: |
          if [ -z "${{ secrets.ADMIN_GITHUB_TOKEN }}" ]; then
            echo "::error::Missing secret ADMIN_GITHUB_TOKEN."
            echo "::error::Create a classic PAT with repo/admin:repo_hook permissions from an org/repo admin."
            exit 1
          fi

      - name: Apply protection rules on main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            await github.request("PUT /repos/{owner}/{repo}/branches/{branch}/protection", {
              owner,
              repo,
              branch: "main",
              required_status_checks: {
                strict: true,
                checks: [
                  { context: "Lint & Typecheck" },
                  { context: "PR Title Convention" },
                  { context: "Branch Name Convention" },
                  { context: "Commit Message Convention" }
                ]
              },
              enforce_admins: true,
              required_pull_request_reviews: {
                dismiss_stale_reviews: true,
                require_code_owner_reviews: false,
                required_approving_review_count: 1,
                require_last_push_approval: true
              },
              restrictions: null,
              required_linear_history: true,
              allow_force_pushes: false,
              allow_deletions: false,
              block_creations: false,
              required_conversation_resolution: true,
              lock_branch: false,
              allow_fork_syncing: true
            });

            core.info(`Branch protection applied on ${owner}/${repo}:main`);
